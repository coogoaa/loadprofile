<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>德国负荷 + R-H 计算器 v1 · DE</title>
<style>
:root{--bg:#080d14;--sur:#0d1320;--sur2:#121a27;--bor:#1b2a3b;--bor2:#233044;--tx:#c5cdd8;--dim:#5e7285;--mute:#344252;--ac:#00c8e8;--ac2:#007fa0;--blue:#6db8ff;--grn:#3dba52;--yel:#d09422;--red:#e84040;--ora:#e07035;--pur:#b07ef8;--mono:"JetBrains Mono","Fira Code","Courier New",monospace;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--tx);font:13px/1.6 -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;}
header{height:48px;background:var(--sur);border-bottom:1px solid var(--bor);display:flex;align-items:center;padding:0 20px;gap:14px;flex-shrink:0;}
.hlogo{font-size:15px;font-weight:700;color:var(--ac);letter-spacing:.04em;}
.hsub{color:var(--dim);font-size:11px;}
.hv2{background:var(--grn);color:#000;font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px;}
.hpill{margin-left:auto;background:var(--ac2);color:#fff;font-size:10px;font-weight:600;padding:3px 9px;border-radius:99px;}
.layout{display:grid;grid-template-columns:296px 1fr;height:calc(100vh - 48px);overflow:hidden;}
aside{background:var(--sur);border-right:1px solid var(--bor);overflow-y:auto;padding:14px 16px;}
.slabel{font-size:10px;font-weight:700;color:var(--dim);margin:14px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--bor);}
.slabel:first-child{margin-top:0;}
.field{margin-bottom:13px;}
.field label{display:block;font-size:11px;font-weight:500;color:var(--dim);margin-bottom:4px;}
.qb{display:inline-block;background:var(--ac2);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;margin-right:3px;}
.qbR{background:var(--ora);}
select,input[type=number]{width:100%;background:var(--sur2);border:1px solid var(--bor2);color:var(--tx);padding:6px 10px;border-radius:5px;font-size:12px;outline:none;appearance:none;cursor:pointer;font-family:inherit;}
select:focus,input:focus{border-color:var(--ac);}
.field.hidden{display:none;}
.note{background:var(--sur2);border:1px solid var(--bor);border-left:3px solid var(--ac);border-radius:4px;padding:7px 10px;font-size:11px;color:var(--dim);margin-top:8px;}
.csv-src{background:var(--sur2);border:1px solid var(--bor);border-left:3px solid var(--grn);border-radius:4px;padding:7px 10px;font-size:10px;color:var(--dim);margin-top:10px;font-family:var(--mono);}
main{overflow-y:auto;padding:18px 22px;background:var(--bg);}
.cards{display:grid;grid-template-columns:repeat(6,1fr);gap:9px;margin-bottom:18px;}
.card{background:var(--sur);border:1px solid var(--bor);border-radius:6px;padding:11px 13px;}
.card.hi{border-color:var(--ac2);}
.card.hi2{border-color:var(--ora);}
.cl{font-size:10px;color:var(--dim);margin-bottom:3px;}
.cv{font-family:var(--mono);font-size:17px;font-weight:700;color:var(--ac);}
.cv.ora{color:var(--ora);}
.cu{font-size:11px;color:var(--dim);}
.sblock{background:var(--sur);border:1px solid var(--bor);border-radius:6px;margin-bottom:11px;overflow:hidden;}
.sblock.rh{border-color:rgba(224,112,53,.35);}
.shdr{display:flex;align-items:center;gap:9px;padding:11px 15px;cursor:pointer;user-select:none;border-bottom:1px solid transparent;}
.shdr:hover{background:var(--sur2);}
.shdr.open{border-bottom-color:var(--bor);}
.snum{background:var(--ac2);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px;}
.snum.rh{background:var(--ora);}
.stit{font-size:13px;font-weight:600;flex:1;}
.sbadge{font-family:var(--mono);font-size:11px;color:var(--blue);}
.chev{color:var(--dim);font-size:10px;transition:transform .18s;}
.chev.open{transform:rotate(90deg);}
.sbody{padding:15px;display:none;}
.sbody.open{display:block;}
.ssec{margin-bottom:15px;}
.sstit{font-size:10px;font-weight:700;color:var(--dim);letter-spacing:.06em;margin-bottom:7px;display:flex;align-items:center;gap:6px;}
.sstit::after{content:'';flex:1;height:1px;background:var(--bor);}
.fml{background:var(--sur2);border:1px solid var(--bor);border-radius:4px;padding:9px 13px;font-family:var(--mono);font-size:11.5px;color:var(--blue);margin:7px 0;white-space:pre-wrap;overflow-x:auto;}
.fml .r{color:var(--ac);font-weight:700;}
.fml .o{color:var(--ora);font-weight:700;}
.fml .c{color:var(--dim);}
.src-tag{font-size:9px;font-family:var(--mono);color:var(--grn);background:rgba(61,186,82,.12);border:1px solid rgba(61,186,82,.25);border-radius:3px;padding:1px 5px;margin-left:6px;}
.tw{overflow-x:auto;margin:7px 0;}
table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11px;}
th{background:var(--sur2);color:var(--dim);padding:4px 9px;text-align:right;font-size:10px;border-bottom:1px solid var(--bor);white-space:nowrap;}
th:first-child{text-align:left;}
td{padding:3px 9px;text-align:right;border-bottom:1px solid var(--bor);color:var(--tx);}
td:first-child{text-align:left;color:var(--dim);}
tr.cool{background:rgba(0,200,232,.04);}
tr.heat{background:rgba(230,90,40,.04);}
tr.both{background:rgba(176,126,248,.06);}
tr.hi{background:rgba(0,200,232,.10);}
tr.hi td{color:var(--ac);font-weight:700;}
.tag{color:var(--ac);font-size:10px;}
.brow{display:flex;align-items:center;gap:7px;height:18px;margin-bottom:2px;}
.blbl{width:28px;font-family:var(--mono);font-size:10px;color:var(--dim);text-align:right;flex-shrink:0;}
.btrk{flex:1;background:var(--sur2);border-radius:2px;height:10px;overflow:hidden;}
.bfil{height:100%;background:var(--ac2);}
.bfil.d{background:var(--yel);}.bfil.p{background:var(--ora);}.bfil.e{background:var(--grn);}
.bval{width:48px;font-family:var(--mono);font-size:10px;color:var(--dim);text-align:right;flex-shrink:0;}
.mchart{display:flex;align-items:flex-end;gap:2px;height:56px;margin:8px 0 2px;}
.mbar{flex:1;background:var(--ac2);border-radius:2px 2px 0 0;}
.mbar.cool{background:#0088aa;}.mbar.heat{background:#8b2e1a;}.mbar.both{background:#8050b8;}
.mlbls{display:flex;gap:2px;margin-bottom:6px;}
.mlbls span{flex:1;text-align:center;font-size:9px;color:var(--mute);}
.ogrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;margin-top:11px;}
.ogrid.rh{grid-template-columns:repeat(4,1fr);}
.ocard{background:var(--sur2);border:1px solid var(--bor);border-radius:6px;padding:13px;}
.ocard.rh{border-color:rgba(224,112,53,.35);}
.ocl{font-size:11px;color:var(--dim);margin-bottom:3px;}
.ocv{font-family:var(--mono);font-size:21px;font-weight:700;color:var(--ac);}
.ocv.ora{color:var(--ora);}
.ock{font-size:11px;color:var(--dim);}
.ver{font-size:11px;color:var(--grn);font-family:var(--mono);margin-top:7px;}
.legend{font-size:10px;color:var(--dim);line-height:2;}
.modeBadge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;font-family:var(--mono);}
.modeRH{background:rgba(224,112,53,.18);color:var(--ora);border:1px solid rgba(224,112,53,.4);}
.modeRB{background:rgba(176,126,248,.18);color:var(--pur);border:1px solid rgba(176,126,248,.4);}
.kvrow{display:flex;justify-content:space-between;border-bottom:1px dashed var(--bor);padding:3px 0;font-family:var(--mono);font-size:11px;}
.kvrow .k{color:var(--dim);} .kvrow .v{color:var(--blue);font-weight:700;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--bor2);border-radius:3px;}
</style>
</head>
<body>
<header>
  <div class="hlogo">⚡ 德国负荷 + R-H 计算器</div>
  <div class="hv2">v1 · DE</div>
  <div class="hsub">SalesAgent V1.12 · 户用光储混合扩容（R-H）</div>
  <div class="hpill">实时</div>
</header>
<div class="layout">
<aside>
  <div class="slabel">负荷参数（Load Profile）</div>
  <div class="field"><label>联邦州</label><select id="s-state"></select></div>
  <div class="field"><label><span class="qb">Q1</span> 在家模式</label>
    <select id="s-q1">
      <option value="Mostly away during the day">白天大多不在家（0.6×）</option>
      <option value="Working from home" selected>在家办公（1.4×）</option>
      <option value="Someone always at home">家中常有人（1.2×）</option>
    </select></div>
  <div class="field"><label><span class="qb">Q2</span> 冷暖设备</label>
    <select id="s-q2">
      <option value="Heat pump (heating &amp; cooling)" selected>热泵（冷暖两用，2000 kWh）</option>
      <option value="Air conditioning">空调（仅制冷，0）</option>
      <option value="Electric heating">电暖（仅制热，3000）</option>
      <option value="No heating or cooling system">无冷暖设备</option>
    </select></div>
  <div class="field" id="f-q3"><label><span class="qb">Q3</span> 使用强度</label>
    <select id="s-q3">
      <option value="Low">低（0.7）</option>
      <option value="Medium" selected>中（1.0）</option>
      <option value="High">高（1.3）</option>
      <option value="Very high">非常高（1.6）</option>
    </select></div>
  <div class="field"><label><span class="qb">Q4</span> EV 年均里程</label>
    <select id="s-q4">
      <option value="0">无电动车</option>
      <option value="5000">5,000 km</option>
      <option value="10000" selected>10,000 km</option>
      <option value="15000">15,000 km</option>
      <option value="20000">20,000 km</option>
      <option value="25000">25,000+ km</option>
    </select></div>
  <div class="field hidden" id="f-q5"><label><span class="qb">Q5</span> EV 充电时段</label>
    <select id="s-q5">
      <option value="mostly_overnight" selected>主要夜间充电</option>
      <option value="mixed_day_and_night">日夜混合</option>
      <option value="mostly_daytime">主要白天</option>
      <option value="solar_optimized">光伏优化</option>
    </select></div>
  <div class="slabel">R-H 输入（既有 PV + 屋顶）</div>
  <div class="field"><label><span class="qb qbR">R1</span> 既有 PV 容量</label>
    <select id="s-pv">
      <option value="-1">不知道 / 跳过（按 55% 估算）</option>
      <option value="4">Under 5 kWp（→ 4）</option>
      <option value="7" selected>5–10 kWp（→ 7）</option>
      <option value="12">10–15 kWp（→ 12）</option>
      <option value="17">15–20 kWp（→ 17）</option>
      <option value="22">20+ kWp（→ 22）</option>
    </select></div>
  <div class="field"><label><span class="qb qbR">R2</span> SAM3D 满铺 kWp</label>
    <input type="number" id="s-3d" value="14" step="0.5" min="0"></div>
  <div class="field"><label><span class="qb qbR">R3</span> 屋顶 2D 面积 m²</label>
    <input type="number" id="s-2d" value="60" step="1" min="0"></div>
  <div class="field"><label><span class="qb qbR">R4</span> 方案档</label>
    <select id="s-tier">
      <option value="A">A 经济（配储 0.7）</option>
      <option value="B" selected>B 标准（配储 0.9）</option>
      <option value="C">C 高端（配储 1.2）</option>
    </select></div>
  <div class="note">所有参数变动即时重算。R-H 流程仅在 existing&lt;25 且 剩余≥2kWp 时启用。</div>
  <div class="csv-src">📄 DE_*.md（德国参数 14 张）<br>📄 R-H计算流程.md</div>
</aside>
<main id="out"></main>
</div>
<script src="de_calc.js"></script>
<script src="de_render.js"></script>
</body>
</html>
